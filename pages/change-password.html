<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <title>變更密碼｜新合達大平台管理後台</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <link rel="stylesheet" href="../css/style-base.css" />
  <link rel="stylesheet" href="../css/page-change-password.css" />
</head>
<body class="module-page">
  <div class="page-head">
    <h1>變更密碼</h1>
  </div>

  <div class="card narrow-card">
    <p class="hint">變更後請使用新密碼重新登入。若忘記目前密碼，請洽其他管理者於「管理者人員」為您重設。</p>
    <form id="change-password-form">
      <div class="field">
        <label for="currentPassword">目前密碼</label>
        <input id="currentPassword" name="currentPassword" type="password" autocomplete="current-password" required />
      </div>

      <div class="field">
        <label for="newPassword">新密碼</label>
        <input id="newPassword" name="newPassword" type="password" autocomplete="new-password" required minlength="4" />
      </div>

      <div class="field">
        <label for="confirmPassword">確認新密碼</label>
        <input id="confirmPassword" name="confirmPassword" type="password" autocomplete="new-password" required minlength="4" />
      </div>

      <p class="error-text" id="form-error" hidden></p>
      <p class="success-text" id="form-success" hidden></p>

      <button class="btn" type="submit" id="submit-btn">變更密碼</button>
    </form>
  </div>

  <script src="../js/auth-service.js"></script>
  <script src="../js/mock-data.js"></script>
  <script src="../js/page-change-password.js"></script>
</body>
</html>

<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <title>工單詳情｜新合達大平台管理後台</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <link rel="stylesheet" href="../css/style-base.css" />
  <link rel="stylesheet" href="../css/page-ticket-detail.css" />
</head>
<body class="module-page">
  <div class="page-head">
    <h1 id="page-title">工單詳情</h1>
    <a class="btn secondary" href="ticket-list.html">返回列表</a>
  </div>

  <p id="loading-message">載入中...</p>
  <p class="error-text" id="error-message" hidden></p>

  <div id="ticket-content" hidden>
    <div class="card ticket-meta-card">
      <div class="meta-row"><span class="meta-label">租戶</span><span id="meta-tenant"></span></div>
      <div class="meta-row"><span class="meta-label">主旨</span><span id="meta-subject"></span></div>
      <div class="meta-row" id="meta-related-row" hidden>
        <span class="meta-label">來源通知</span><a id="meta-related-link" href="#"></a>
      </div>
      <div class="meta-row"><span class="meta-label">建立人</span><span id="meta-created-by"></span></div>
      <div class="meta-row"><span class="meta-label">建立時間</span><span id="meta-created-at"></span></div>
    </div>

    <div class="card">
      <div class="field-row">
        <div class="field">
          <label for="status-select">狀態</label>
          <select id="status-select">
            <option value="open">受理中</option>
            <option value="inProgress">處理中</option>
            <option value="resolved">已回覆</option>
            <option value="closed">結案</option>
          </select>
        </div>
        <div class="field">
          <label for="assignee-select">承辦人</label>
          <select id="assignee-select">
            <option value="">未指派</option>
          </select>
        </div>
      </div>
      <p class="hint">變更承辦人會立即儲存；狀態則於下方點擊「回覆並更新狀態」時一併套用。</p>
    </div>

    <div class="card thread-card">
      <h2>訊息紀錄</h2>
      <div id="thread" class="thread"></div>
    </div>

    <div class="card">
      <h2>回覆</h2>
      <div class="field">
        <label for="reply-content">回覆內容</label>
        <textarea id="reply-content" rows="4" placeholder="輸入回覆內容"></textarea>
      </div>
      <div class="field">
        <label for="reply-attachments">附件（最多 5 個檔案，僅原型展示檔名，不會實際上傳）</label>
        <input id="reply-attachments" type="file" multiple />
        <div id="attachment-chips" class="chips"></div>
      </div>
      <p class="error-text" id="reply-error" hidden></p>
      <p class="success-text" id="reply-success" hidden></p>
      <button class="btn" type="button" id="reply-btn">回覆並更新狀態</button>
    </div>
  </div>

  <script src="../js/auth-service.js"></script>
  <script src="../js/mock-data.js"></script>
  <script src="../js/page-ticket-detail.js"></script>
</body>
</html>

<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <title>建商租戶登入｜新合達大平台</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <link rel="stylesheet" href="css/style-base.css" />
  <link rel="stylesheet" href="css/biz-theme.css" />
  <link rel="stylesheet" href="css/page-login.css" />
</head>
<body>
  <div class="login-page">
    <form class="card login-card" id="login-form">
      <p class="eyebrow">新合達大平台</p>
      <h1><i class="fa-solid fa-building"></i> 建商租戶登入</h1>

      <div class="field">
        <label for="taxId">統一編號</label>
        <input id="taxId" name="taxId" type="text" autocomplete="off" />
      </div>

      <div class="field">
        <label for="account">帳號</label>
        <input id="account" name="account" type="text" autocomplete="username" />
      </div>

      <div class="field">
        <label for="password">密碼</label>
        <input id="password" name="password" type="password" autocomplete="current-password" />
      </div>

      <p class="error-text" id="error-message" hidden></p>

      <button class="btn" type="submit" id="submit-btn">登入</button>
      <p class="forgot-link"><a href="biz-forgot-password.html">忘記密碼？</a></p>

      <p class="demo-hint">
        示範帳號（僅供前端展示）：<br />
        陸府建設 12345678／lufu.manager／55688<br />
        三民建設 87654321／smc.miss／55688
      </p>
    </form>
  </div>

  <script src="js/mock-data.js"></script>
  <script src="js/biz-auth-service.js"></script>
  <script src="js/page-biz-login.js"></script>
</body>
</html>

<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <title>忘記密碼｜新合達大平台</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <link rel="stylesheet" href="css/style-base.css" />
  <link rel="stylesheet" href="css/biz-theme.css" />
  <link rel="stylesheet" href="css/page-login.css" />
  <link rel="stylesheet" href="css/page-biz-forgot-password.css" />
</head>
<body>
  <div class="login-page">
    <form class="card login-card" id="forgot-form">
      <p class="eyebrow">新合達大平台</p>
      <h1><i class="fa-solid fa-key"></i> 忘記密碼</h1>
      <p class="hint">請輸入統一編號、帳號與註冊時登記的 Email，驗證成功後系統會將新密碼寄送至該 Email。</p>

      <div class="field">
        <label for="taxId">統一編號</label>
        <input id="taxId" name="taxId" type="text" autocomplete="off" required />
      </div>

      <div class="field">
        <label for="account">帳號</label>
        <input id="account" name="account" type="text" autocomplete="username" required />
      </div>

      <div class="field">
        <label for="email">登記 Email</label>
        <input id="email" name="email" type="email" required />
      </div>

      <p class="error-text" id="error-message" hidden></p>
      <p class="success-text" id="success-message" hidden></p>

      <div class="email-preview-block" id="email-preview-card" hidden>
        <h2>模擬寄送信件內容（原型展示用，正式環境僅寄送 Email）</h2>
        <dl class="email-preview">
          <dt>收件人</dt><dd id="email-preview-to"></dd>
          <dt>帳號</dt><dd id="email-preview-account"></dd>
          <dt>新密碼</dt><dd id="email-preview-password"></dd>
        </dl>
      </div>

      <button class="btn" type="submit" id="submit-btn">重設密碼</button>
      <p class="forgot-link"><a href="biz-login.html">返回登入</a></p>
    </form>
  </div>

  <script src="js/mock-data.js"></script>
  <script src="js/page-biz-forgot-password.js"></script>
</body>
</html>
